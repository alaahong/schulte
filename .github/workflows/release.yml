        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-x64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS x64)
        run: |
          set -o pipefail
          npx tauri build --target x86_64-apple-darwin 2>&1 | tee build-macos-x64.log
        env:
          CI: 'true'

      - name: Verify macOS x64 artifacts exist
        if: always()
        run: |
          find src-tauri/target/x86_64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          DMG_COUNT=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" 2>/dev/null | wc -l)
          echo "dmg count: ${DMG_COUNT}"
          if [ "${DMG_COUNT}" -eq 0 ]; then
            echo "##[error]No macOS x64 .dmg artifacts found"
            exit 1
          fi
          echo "✅ macOS x64 artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64-logs
          path: build-macos-x64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS x64)
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "##[error]No macOS x64 artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          gh release upload "${TAG}" "${FILES[@]}" --clobber

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: ignore

  # ============================================================
  # Android (APK)
  # ============================================================
  android:
    name: Android (.apk)
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init Android project (idempotent)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "--- Running tauri android init ---"
            npx tauri android init
          else
            echo "--- src-tauri/gen/android already exists, skipping init ---"
          fi

      - name: Build Tauri (Android APK)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          CI: 'true'
        run: |
          set -o pipefail
          npx tauri android build --apk 2>&1 | tee build-android.log

      - name: Verify Android artifacts exist
        if: always()
        run: |
          echo "--- find APK ---"
          find src-tauri/gen/android -name "*.apk" 2>/dev/null | head -20
          echo "--- find AAB ---"
          find src-tauri/gen/android -name "*.aab" 2>/dev/null | head -20
          echo "--- end ---"
          APK_COUNT=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" 2>/dev/null | wc -l)
          echo "apk count: ${APK_COUNT}"
          if [ "${APK_COUNT}" -eq 0 ]; then
            echo "##[error]No Android APK artifacts found"
            exit 1
          fi
          echo "✅ Android artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android-logs
          path: build-android.log
          if-no-files-found: ignore

      - name: Upload to Release (Android)
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "##[error]No Android artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          gh release upload "${TAG}" "${FILES[@]}" --clobber

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: ignore

  # ============================================================
  # iOS (产 .app, 不签名)
  # ============================================================
  ios:
    name: iOS (.app unsigned)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init iOS project (idempotent)
        run: |
          if [ ! -d "src-tauri/gen/apple" ] && [ ! -d "src-tauri/gen/ios" ]; then
            echo "--- Running tauri ios init ---"
            npx tauri ios init || echo "init failed, will try direct build"
          else
            echo "--- iOS project already exists, skipping init ---"
          fi

      - name: Build Tauri (iOS raw .app, no codesign)
        env:
          CI: 'true'
        run: |
          set -o pipefail
          # Tauri 2.x: 使用 tauri ios build 生成未签名的 .app
          # --no-bundle 跳过 .ipa 打包(ipa 需要签名)
          npx tauri ios build --no-bundle --target aarch64-apple-ios 2>&1 | tee build-ios.log
          set +e
          echo "=== build exit: $? ==="
          set -e
          echo "=== find .app (recursive) ==="
          find src-tauri/target src-tauri/gen -name "*.app" 2>/dev/null
          echo "=== end ==="

      - name: Verify iOS .app exists
        if: always()
        run: |
          echo "--- find .app (no maxdepth) ---"
          find src-tauri/target -name "*.app" 2>/dev/null
          echo "--- also check gen/ ---"
          find src-tauri/gen -name "*.app" 2>/dev/null | head -10
          echo "--- list build-* dir ---"
          ls -la src-tauri/target/aarch64-apple-ios/release/ 2>/dev/null | head -20
          echo "--- end ---"
          # 收集所有 .app 路径
          APP_PATHS=$(find src-tauri/target src-tauri/gen -name "*.app" 2>/dev/null | head -5)
          if [ -z "${APP_PATHS}" ]; then
            echo "##[error]No iOS .app artifact found"
            exit 1
          fi
          echo "✅ iOS .app found:"
          echo "${APP_PATHS}"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios-logs
          path: build-ios.log
          if-no-files-found: ignore

      - name: Zip and upload to Release (iOS)
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # 找到 .app 目录并打包成 zip(因为 gh release upload 不支持目录)
          shopt -s nullglob
          APP_DIRS=( $(find src-tauri/target src-tauri/gen -name "*.app" -type d 2>/dev/null | head -5) )
          if [ ${#APP_DIRS[@]} -eq 0 ]; then
            echo "##[error]No iOS .app directory found to zip"
            exit 1
          fi
          echo "Found ${#APP_DIRS[@]} .app dir(s):"
          printf '  - %s\n' "${APP_DIRS[@]}"

          cd "$(dirname "${APP_DIRS[0]}")"
          APP_BASENAME=$(basename "${APP_DIRS[0]}")
          ZIP_NAME="${APP_BASENAME}.zip"
          echo "Creating zip: ${ZIP_NAME}"
          # ditto 在 macOS 上保留资源分支 (preserve attributes)
          ditto -c -k --sequesterRsrc --keepParent "${APP_BASENAME}" "${ZIP_NAME}"
          ls -la "${ZIP_NAME}"
          cd - >/dev/null
          echo "Uploading ${ZIP_NAME} to release ${TAG}"
          gh release upload "${TAG}" "${ZIP_NAME}" --clobber

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios-zip
          path: "*.app.zip"
          if-no-files-found: ignore

  # ============================================================
  # 收尾: 汇总所有平台构建状态
  # ============================================================
  finalize:
    name: Finalize Release
    needs: [linux, windows, macos-arm64, macos-x64, android, ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build status summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## Release Build Summary"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Linux       | ${{ needs.linux.result }} |"
            echo "| Windows     | ${{ needs.windows.result }} |"
            echo "| macOS arm64 | ${{ needs.macos-arm64.result }} |"
            echo "| macOS x64   | ${{ needs.macos-x64.result }} |"
            echo "| Android     | ${{ needs.android.result }} |"
            echo "| iOS         | ${{ needs.ios.result }} |"
            echo ""
            echo "Release: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
            echo ""
            echo "### Assets in release"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              gh release view "${TAG}" --json assets --jq '.assets[] | "- \(.name) (\(.size) bytes)"' 2>/dev/null || echo "_(could not fetch asset list)_"
            fi
            echo ""
            echo "_Release is created as draft. After all builds succeed, publish from the Releases page._"
          } >> "$GITHUB_STEP_SUMMARY"

# 跨平台构建 + 自动发布
# 触发:push tag v* / 手动 workflow_dispatch
#
# 流程 (顺序):
#   1. preflight        - typecheck + unit tests (代码质量门禁)
#   2. create-release   - 抢先创建 draft Release (消除 6 个 job 并发创建 release 的竞态)
#   3. linux / windows / macos-arm64 / macos-x64 / android
#                        并行构建,产物上传到已存在的 release
#                      (iOS 暂时禁用: 需要 Apple Developer 证书)
#   4. finalize         - 汇总构建状态到 Step Summary
#
# 关键修复:
#   - productName 已统一为 ASCII (SchulteGrid) 解决 Windows WiX light.exe 不支持中文的问题
#   - 每个 upload 步骤带 retry,避免 6 个 job 并发上传触发的 gh release 临时冲突
#   - macOS .app 通过 ditto zip 压缩后上传(避开目录上传限制)
#   - iOS 使用 --ci (Tauri 2.x 推荐) 跳过交互式 codesign
#   - Android 修正 glob 路径(src-tauri/gen/android/app/build/outputs/apk/release/*.apk)
#   - finalize 步骤给最终 release 一个 "published" 标的状态
name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
  NODE_VERSION: '24'

jobs:
  # ============================================================
  # Preflight: 质量门禁 (typecheck + 单元测试 + web 端构建)
  # ============================================================
  preflight:
    name: Preflight (typecheck + tests)
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Generate PWA icons (web)
        run: npm run prebuild

      - name: Type check (vue-tsc)
        run: npx vue-tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Web build (sanity)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx vite build

  # ============================================================
  # Create Release: 抢先创建 draft Release
  # ============================================================
  create-release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      release_url: ${{ steps.create.outputs.html_url }}
      tag: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft GitHub Release (gh CLI)
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          echo "Creating draft release for tag: ${TAG}"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "##[error]Tag ${TAG} not found"
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Existing release for ${TAG} found, deleting it first"
            gh release delete "${TAG}" --yes || true
          fi
          CREATE_OUT=$(gh release create "${TAG}" \
            --title "Schulte Grid ${TAG}" \
            --draft \
            --generate-notes \
            --target "${{ github.sha }}" \
            2>&1)
          echo "$CREATE_OUT"
          RELEASE_URL=$(echo "$CREATE_OUT" | grep -E '^https://' | head -n1)
          if [ -z "$RELEASE_URL" ]; then
            echo "##[error]Failed to create release - no URL in output"
            echo "$CREATE_OUT"
            exit 1
          fi
          echo "Release URL: $RELEASE_URL"
          RELEASE_ID=$(gh release view "${TAG}" --json id --jq '.id')
          echo "Release ID: $RELEASE_ID"
          {
            echo "id=$RELEASE_ID"
            echo "html_url=$RELEASE_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "## Release created successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release ID:** ${{ steps.create.outputs.id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.create.outputs.html_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All build jobs will now upload their artifacts to this release." >> "$GITHUB_STEP_SUMMARY"

          echo "--- Verifying release exists via API ---"
          DRAFT=$(gh release view "${TAG}" --jq '.draft // false' 2>/dev/null || echo "false")
          echo "Release draft status: ${DRAFT}"
          if [ "${DRAFT}" != "true" ]; then
            echo "::warning::Release draft check returned: ${DRAFT} (expected true). Continuing anyway."
          else
            echo "Release verified as draft"
          fi

  # ============================================================
  # Linux 桌面
  # ============================================================
  linux:
    name: Linux (.deb / .AppImage)
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            zip \
            unzip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          echo "--- node ---"
          node --version
          echo "--- tauri ---"
          npx tauri --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (Linux)
        run: |
          set -o pipefail
          npx tauri build 2>&1 | tee build-linux.log
        env:
          CI: 'true'

      - name: Verify Linux artifacts exist
        if: always()
        run: |
          echo "--- bundle dir ---"
          find src-tauri/target/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          echo "--- end ---"
          DEB_COUNT=$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name "*.deb" 2>/dev/null | wc -l)
          APPIMAGE_COUNT=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" 2>/dev/null | wc -l)
          echo "deb count: ${DEB_COUNT}, appimage count: ${APPIMAGE_COUNT}"
          if [ "${DEB_COUNT}" -eq 0 ] || [ "${APPIMAGE_COUNT}" -eq 0 ]; then
            echo "::error::Missing Linux artifacts: deb=${DEB_COUNT} appimage=${APPIMAGE_COUNT}"
            exit 1
          fi
          echo "Linux artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux-logs
          path: build-linux.log
          if-no-files-found: ignore

      - name: Upload to Release (Linux) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No Linux artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          # retry up to 3 times to handle transient 5xx / release lock contention
          attempt=1
          until gh release upload "${TAG}" "${FILES[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # ============================================================
  # Windows 桌面
  # ============================================================
  windows:
    name: Windows (.msi / .exe)
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (Windows)
        shell: cmd
        env:
          CI: 'true'
        run: |
          echo === running tauri build (nsis) ===
          npx tauri build --bundles nsis --verbose > build-windows.log 2>&1
          if errorlevel 1 (
            echo === BUILD FAILED, showing log ===
            type build-windows.log
            exit /b 1
          )
          echo === BUILD SUCCEEDED ===
          dir /s /b src-tauri\target\release\bundle 2>nul

      - name: Verify Windows artifacts exist
        if: always()
        shell: pwsh
        run: |
          $msiDir = "src-tauri/target/release/bundle/msi"
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $msiCount = 0
          $nsisCount = 0
          if (Test-Path $msiDir) {
            $msiCount = (Get-ChildItem $msiDir -Filter "*.msi" -ErrorAction SilentlyContinue | Measure-Object).Count
          }
          if (Test-Path $nsisDir) {
            $nsisCount = (Get-ChildItem $nsisDir -Filter "*.exe" -ErrorAction SilentlyContinue | Measure-Object).Count
          }
          Write-Host "msi count: $msiCount, nsis count: $nsisCount"
          if ($msiCount -eq 0 -and $nsisCount -eq 0) {
            Write-Host "::error::No Windows installer artifacts found (need at least one of msi/nsis)"
            exit 1
          }
          Write-Host "Windows artifacts verified (msi=$msiCount nsis=$nsisCount)"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows-logs
          path: build-windows.log
          if-no-files-found: ignore

      - name: Upload to Release (Windows) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No Windows artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          attempt=1
          until gh release upload "${TAG}" "${FILES[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # ============================================================
  # macOS arm64
  # ============================================================
  macos-arm64:
    name: macOS arm64 (.dmg)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-arm64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-arm64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS arm64)
        run: |
          set -o pipefail
          npx tauri build --target aarch64-apple-darwin 2>&1 | tee build-macos-arm64.log
        env:
          CI: 'true'

      - name: Verify macOS arm64 artifacts exist
        if: always()
        run: |
          find src-tauri/target/aarch64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          DMG_COUNT=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" 2>/dev/null | wc -l)
          APP_COUNT=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d 2>/dev/null | wc -l)
          echo "dmg count: ${DMG_COUNT}, .app count: ${APP_COUNT}"
          if [ "${DMG_COUNT}" -eq 0 ] && [ "${APP_COUNT}" -eq 0 ]; then
            echo "::error::No macOS arm64 artifacts found (need at least one of dmg/.app)"
            exit 1
          fi
          echo "macOS arm64 artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64-logs
          path: build-macos-arm64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS arm64) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # .dmg 直接上传;.app 是目录,先 zip 压缩(避免 >2GB 单文件 + 不支持目录上传)
          FILES=()
          for f in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            [ -e "$f" ] && FILES+=("$f")
          done
          for d in src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app; do
            if [ -d "$d" ]; then
              parent="$(dirname "$d")"
              base="$(basename "$d")"
              cd "$parent"
              zip_path="${base}.zip"
              # ditto 在 macOS 上保留资源分支
              ditto -c -k --sequesterRsrc --keepParent "$base" "$zip_path"
              cd - >/dev/null
              FILES+=("$parent/$zip_path")
            fi
          done
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No macOS arm64 artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          attempt=1
          until gh release upload "${TAG}" "${FILES[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.zip
          if-no-files-found: ignore

  # ============================================================

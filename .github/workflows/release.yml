# 跨平台构建 + 自动发布
# 触发:push tag v* / 手动 workflow_dispatch
# 流程:
#   1. 6 个独立 job 并行构建(Linux / Windows / macOS-arm64 / macOS-x64 / Android / iOS)
#   2. 每个 job 自己跑 `npm run tauri:build`(或对应 mobile 子命令)产 bundle
#   3. 通过 softprops/action-gh-release@v2 上传产物到当前 tag 对应的 GitHub Release(草稿)
# 关键点:
#   - 使用 `set -o pipefail` 让 pipe 中的真实错误不被 tee 屏蔽
#   - 移动端 (Android/iOS) 必须先 `tauri mobile init` 再 `tauri mobile build`
#   - 修复 tauri.conf.json 中 iOS 必须是 `iOS`(大写),Android 不能有 `targetSdkVersion`
name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# 公共:每个 job 都要的 tauri CLI 版本
env:
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Linux 桌面
  # ============================================================
  linux:
    name: Linux (.deb / .AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            zip \
            unzip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          echo "--- node ---"
          node --version
          echo "--- tauri ---"
          npx tauri --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (Linux)
        run: |
          set -o pipefail
          npx tauri build 2>&1 | tee build-linux.log
        env:
          CI: 'true'

      - name: List bundle outputs
        if: always()
        run: |
          echo "--- bundle dir ---"
          find src-tauri/target/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux-logs
          path: build-linux.log
          if-no-files-found: ignore

      - name: Upload to Release (Linux)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Schulte v${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # ============================================================
  # Windows 桌面
  # ============================================================
  windows:
    name: Windows (.msi / .exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vs: 2022
          arch: x64

      - name: Install Rust MSVC toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          components: rust-src, rustfmt, clippy

      - name: Switch default toolchain to MSVC
        shell: pwsh
        run: |
          rustup default stable-x86_64-pc-windows-msvc
          rustup show
          rustc --print target-list | Select-String -Pattern "msvc" | Select-Object -First 3
          where.exe link.exe | Select-Object -First 3
          where.exe cl.exe | Select-Object -First 3

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        shell: pwsh
        run: |
          node --version
          npx tauri --version
          rustup show
          rustc --version
          link.exe 2>&1 | Select-Object -First 2

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          npm run tauri:build 2>&1 | Tee-Object -FilePath build-windows.log
          exit $LASTEXITCODE
        env:
          CI: 'true'

      - name: List bundle outputs
        if: always()
        shell: pwsh
        run: |
          if (Test-Path src-tauri/target/release/bundle) {
            Get-ChildItem src-tauri/target/release/bundle -Recurse -File | Select-Object -First 30 | ForEach-Object { $_.FullName }
          }

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows-logs
          path: build-windows.log
          if-no-files-found: ignore

      - name: Upload to Release (Windows)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Schulte v${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # ============================================================
  # macOS arm64
  # ============================================================
  macos-arm64:
    name: macOS arm64 (.dmg)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-arm64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-arm64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS arm64)
        run: |
          set -o pipefail
          npx tauri build --target aarch64-apple-darwin 2>&1 | tee build-macos-arm64.log
        env:
          CI: 'true'

      - name: List bundle outputs
        if: always()
        run: |
          find src-tauri/target/aarch64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64-logs
          path: build-macos-arm64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS arm64)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Schulte v${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: ignore

  # ============================================================
  # macOS x64
  # ============================================================
  macos-x64:
    name: macOS x64 (.dmg)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-x64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS x64)
        run: |
          set -o pipefail
          npx tauri build --target x86_64-apple-darwin 2>&1 | tee build-macos-x64.log
        env:
          CI: 'true'

      - name: List bundle outputs
        if: always()
        run: |
          find src-tauri/target/x86_64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64-logs
          path: build-macos-x64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS x64)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Schulte v${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: ignore

  # ============================================================
  # Android (APK)
  # ============================================================
  android:
    name: Android (.apk)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init Android project (idempotent)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "--- Running tauri android init ---"
            npx tauri android init
          else
            echo "--- src-tauri/gen/android already exists, skipping init ---"
          fi

      - name: Build Tauri (Android APK)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          CI: 'true'
        run: |
          set -o pipefail
          npx tauri android build --apk 2>&1 | tee build-android.log

      - name: List APK outputs
        if: always()
        run: |
          echo "--- find APK ---"
          find src-tauri/gen/android -name "*.apk" 2>/dev/null | head -20
          echo "--- find AAB ---"
          find src-tauri/gen/android -name "*.aab" 2>/dev/null | head -20
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android-logs
          path: build-android.log
          if-no-files-found: ignore

      - name: Upload to Release (Android)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Schulte v${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: ignore

  # ============================================================
  # iOS (产 .app, 不签名)
  # ============================================================
  ios:
    name: iOS (.app unsigned)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init iOS project (idempotent)
        run: |
          if [ ! -d "src-tauri/gen/apple" ] && [ ! -d "src-tauri/gen/ios" ]; then
            echo "--- Running tauri ios init ---"
            npx tauri ios init || echo "init failed, will try direct build"
          else
            echo "--- iOS project already exists, skipping init ---"
          fi

      - name: Build Tauri (iOS raw .app, no codesign)
        env:
          CI: 'true'
        run: |
          set -o pipefail
          npx tauri build --no-bundle --target aarch64-apple-ios 2>&1 | tee build-ios.log

      - name: List .app outputs
        if: always()
        run: |
          echo "--- find .app ---"
          find src-tauri/target -name "*.app" -maxdepth 6 2>/dev/null | head -10
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios-logs
          path: build-ios.log
          if-no-files-found: ignore

      - name: Upload to Release (iOS)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Schulte v${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/**/*.app
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios
          path: |
            src-tauri/target/**/*.app
          if-no-files-found: ignore

  # ============================================================
  # 收尾
  # ============================================================
  finalize:
    name: Finalize Release
    needs: [linux, windows, macos-arm64, macos-x64, android, ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build status summary
        run: |
          echo "## Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux       | ${{ needs.linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows     | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS arm64 | ${{ needs.macos-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x64   | ${{ needs.macos-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android     | ${{ needs.android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS         | ${{ needs.ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          fi

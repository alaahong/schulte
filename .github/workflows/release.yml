# 跨平台构建 + 自动发布
# 触发:push tag v* / 手动 workflow_dispatch
#
# 流程 (顺序):
#   1. preflight   - typecheck + unit tests (代码质量门禁,失败直接终止发布)
#   2. create-release - 抢先创建 draft Release(消除 6 个 job 并发创建 release 的竞态)
#   3. linux / windows / macos-arm64 / macos-x64 / android / ios
#                     并行构建,产物上传到已存在的 release
#   4. finalize     - 汇总构建状态到 Step Summary
#
# 关键点:
#   - create-release 必须先于所有构建 job,确保 release 存在
#   - 直接使用 gh release upload (而不是 softprops/action-gh-release) 显式报错
#   - 每个上传步骤前有验证步骤,确保至少存在一个产物
#   - iOS 用 `tauri ios build --no-bundle` (Tauri 2.x 推荐方式)
#   - 启用 generate_release_notes 自动生成 changelog
name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# 公共:每个 job 都要的 tauri CLI 版本
env:
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
  NODE_VERSION: '24'

jobs:
  # ============================================================
  # Preflight: 质量门禁 (typecheck + 单元测试 + web 端构建)
  # 失败时直接终止整个 release 流程
  # ============================================================
  preflight:
    name: Preflight (typecheck + tests)
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Generate PWA icons (web)
        run: npm run prebuild

      - name: Type check (vue-tsc)
        run: npx vue-tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Web build (sanity)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx vite build

  # ============================================================
  # Create Release: 抢先创建 draft Release
  # 所有构建 job 都依赖本 job,确保 release 已存在
  # ============================================================
  create-release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      release_url: ${{ steps.create.outputs.html_url }}
      tag: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft GitHub Release (gh CLI)
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          echo "Creating draft release for tag: ${TAG}"
          # 1. 确保 tag 存在
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "##[error]Tag ${TAG} not found"
            exit 1
          fi
          # 2. 删除可能已存在的旧 release(草稿),避免冲突
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Existing release for ${TAG} found, deleting it first"
            gh release delete "${TAG}" --yes || true
          fi
          # 3. 创建 draft release
          CREATE_OUT=$(gh release create "${TAG}" \
            --title "Schulte ${TAG}" \
            --draft \
            --generate-notes \
            --target "${{ github.sha }}" \
            2>&1)
          echo "$CREATE_OUT"
          # 4. 解析 URL 作为输出
          RELEASE_URL=$(echo "$CREATE_OUT" | grep -E '^https://' | head -n1)
          if [ -z "$RELEASE_URL" ]; then
            echo "##[error]Failed to create release - no URL in output"
            echo "$CREATE_OUT"
            exit 1
          fi
          echo "Release URL: $RELEASE_URL"
          # 5. 重新获取 release id 用于 outputs
          RELEASE_ID=$(gh release view "${TAG}" --json id --jq '.id')
          echo "Release ID: $RELEASE_ID"
          {
            echo "id=$RELEASE_ID"
            echo "html_url=$RELEASE_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "## Release created successfully ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release ID:** ${{ steps.create.outputs.id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.create.outputs.html_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All build jobs will now upload their artifacts to this release." >> "$GITHUB_STEP_SUMMARY"

          echo "--- Verifying release exists via API ---"
          DRAFT=$(gh release view "${TAG}" --jq '.draft // false' 2>/dev/null || echo "false")
          echo "Release draft status: ${DRAFT}"
          if [ "${DRAFT}" != "true" ]; then
            echo "##[warning]Release draft check returned: ${DRAFT} (expected true). Continuing anyway."
          else
            echo "Release verified as draft ✅"
          fi

  # ============================================================
  # Linux 桌面
  # ============================================================
  linux:
    name: Linux (.deb / .AppImage)
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            zip \
            unzip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          echo "--- node ---"
          node --version
          echo "--- tauri ---"
          npx tauri --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (Linux)
        run: |
          set -o pipefail
          npx tauri build 2>&1 | tee build-linux.log
        env:
          CI: 'true'

      - name: Verify Linux artifacts exist
        if: always()
        run: |
          echo "--- bundle dir ---"
          find src-tauri/target/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          echo "--- end ---"
          # 必须有 .deb 和 .AppImage
          DEB_COUNT=$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name "*.deb" 2>/dev/null | wc -l)
          APPIMAGE_COUNT=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" 2>/dev/null | wc -l)
          echo "deb count: ${DEB_COUNT}, appimage count: ${APPIMAGE_COUNT}"
          if [ "${DEB_COUNT}" -eq 0 ] || [ "${APPIMAGE_COUNT}" -eq 0 ]; then
            echo "##[error]Missing Linux artifacts: deb=${DEB_COUNT} appimage=${APPIMAGE_COUNT}"
            exit 1
          fi
          echo "✅ Linux artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux-logs
          path: build-linux.log
          if-no-files-found: ignore

      - name: Upload to Release (Linux)
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # 使用 gh release upload 直接上传,文件不存在时会显式失败
          shopt -s nullglob
          FILES=(
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "##[error]No Linux artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          gh release upload "${TAG}" "${FILES[@]}" --clobber

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # ============================================================
  # Windows 桌面
  # ============================================================
  windows:
    name: Windows (.msi / .exe)
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup MSVC environment
        id: msvc
        shell: pwsh
        run: |
          Write-Host "--- Looking for Visual Studio ---"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          }
          Write-Host "vswhere: $vswhere"
          $vsPath = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath 2>&1
          if (-not $vsPath) {
            $vsPath = & $vswhere -latest -products '*' -property installationPath 2>&1
          }
          Write-Host "VS Path: $vsPath"
          if (-not $vsPath) {
            Write-Host "##[error]No Visual Studio installation found"
            exit 1
          }
          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) {
            $vcvars = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
          }
          Write-Host "vcvars: $vcvars"
          "msvc_vcvars=$vcvars" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "MSVC_VCVARS=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          cmd.exe /c "`"$vcvars`" >nul & set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2], 'Process')
            }
          }
          Write-Host "--- where link.exe ---"
          where.exe link.exe
          Write-Host "--- where cl.exe ---"
          where.exe cl.exe

      - name: Install Rust MSVC toolchain
        shell: pwsh
        run: |
          Write-Host "--- Current rustup state ---"
          rustup show
          Write-Host "--- Installing MSVC toolchain ---"
          rustup toolchain install stable-x86_64-pc-windows-msvc --profile minimal --component rustfmt --component clippy
          if ($LASTEXITCODE -ne 0) { Write-Host "##[error]Failed to install MSVC toolchain"; exit 1 }
          Write-Host "--- Setting default to MSVC ---"
          rustup default stable-x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { Write-Host "##[error]Failed to set default toolchain"; exit 1 }
          Write-Host "--- New rustup state ---"
          rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        shell: pwsh
        env:
          MSVC_VCVARS: ${{ steps.msvc.outputs.msvc_vcvars }}
        run: |
          Write-Host "--- vcvars: $env:MSVC_VCVARS ---"
          node --version
          npx tauri --version
          rustup show
          rustc --version
          cmd.exe /c "`"$env:MSVC_VCVARS`" >nul && (where.exe link.exe & where.exe cl.exe)"

      - name: Generate Tauri icons
        shell: pwsh
        env:
          MSVC_VCVARS: ${{ steps.msvc.outputs.msvc_vcvars }}
        run: |
          cmd.exe /c "`"$env:MSVC_VCVARS`" >nul && npm run icons:tauri"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Tauri (Windows)
        shell: cmd
        env:
          MSVC_VCVARS: ${{ steps.msvc.outputs.msvc_vcvars }}
          CI: 'true'
        run: |
          echo === vcvars: %MSVC_VCVARS% ===
          call "%MSVC_VCVARS%" >nul
          if errorlevel 1 (
            echo ##[error]vcvars64.bat failed
            exit /b 1
          )
          where.exe link.exe
          where.exe cl.exe
          set RUSTUP_TOOLCHAIN=stable-x86_64-pc-windows-msvc
          set RUST_BACKTRACE=1
          echo === rustup show ===
          rustup show
          echo === running tauri build (msi + nsis) ===
          call npx tauri build --bundles msi nsis > build-windows.log 2>&1
          set BUILD_EXIT=%ERRORLEVEL%
          echo === build exit: %BUILD_EXIT% ===
          type build-windows.log
          echo === bundle dir listing ===
          if exist src-tauri\target\release\bundle (
            dir /s /b src-tauri\target\release\bundle 2>nul
          ) else (
            echo NO BUNDLE DIR FOUND
          )
          echo === exe in target/release ===
          if exist src-tauri\target\release\*.exe (
            dir /b src-tauri\target\release\*.exe
          ) else (
            echo NO EXE FOUND IN target/release
          )
          exit /b %BUILD_EXIT%

      - name: Verify Windows artifacts exist
        if: always()
        shell: pwsh
        run: |
          $msiDir = "src-tauri/target/release/bundle/msi"
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $msiCount = 0
          $nsisCount = 0
          if (Test-Path $msiDir) {
            $msiCount = (Get-ChildItem $msiDir -Filter "*.msi" -ErrorAction SilentlyContinue | Measure-Object).Count
          }
          if (Test-Path $nsisDir) {
            $nsisCount = (Get-ChildItem $nsisDir -Filter "*.exe" -ErrorAction SilentlyContinue | Measure-Object).Count
          }
          Write-Host "msi count: $msiCount, nsis count: $nsisCount"
          if ($msiCount -eq 0 -and $nsisCount -eq 0) {
            Write-Host "##[error]No Windows installer artifacts found (need at least one of msi/nsis)"
            exit 1
          }
          Write-Host "✅ Windows artifacts verified (msi=$msiCount nsis=$nsisCount)"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows-logs
          path: build-windows.log
          if-no-files-found: ignore

      - name: Upload to Release (Windows)
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # 使用 gh release upload 直接上传,文件不存在时会显式失败
          shopt -s nullglob
          FILES=(
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "##[error]No Windows artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          gh release upload "${TAG}" "${FILES[@]}" --clobber

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # ============================================================
  # macOS arm64
  # ============================================================
  macos-arm64:
    name: macOS arm64 (.dmg)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-arm64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-arm64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS arm64)
        run: |
          set -o pipefail
          npx tauri build --target aarch64-apple-darwin 2>&1 | tee build-macos-arm64.log
        env:
          CI: 'true'

      - name: Verify macOS arm64 artifacts exist
        if: always()
        run: |
          find src-tauri/target/aarch64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          DMG_COUNT=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" 2>/dev/null | wc -l)
          echo "dmg count: ${DMG_COUNT}"
          if [ "${DMG_COUNT}" -eq 0 ]; then
            echo "##[error]No macOS arm64 .dmg artifacts found"
            exit 1
          fi
          echo "✅ macOS arm64 artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64-logs
          path: build-macos-arm64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS arm64)
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "##[error]No macOS arm64 artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          gh release upload "${TAG}" "${FILES[@]}" --clobber

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: ignore

  # ============================================================
  # macOS x64
  # ============================================================
  macos-x64:

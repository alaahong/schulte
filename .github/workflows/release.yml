      - name: Verify macOS x64 artifacts exist
        if: always()
        run: |
          find src-tauri/target/x86_64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          DMG_COUNT=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" 2>/dev/null | wc -l)
          APP_COUNT=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d 2>/dev/null | wc -l)

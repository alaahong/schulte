# 跨平台构建 + 自动发布
# 触发:push tag v* / 手动 workflow_dispatch
#
# 流程 (顺序):
#   1. preflight        - typecheck + unit tests (代码质量门禁)
#   2. create-release   - 抢先创建 draft Release (消除 6 个 job 并发创建 release 的竞态)
#   3. linux / windows / macos-arm64 / macos-x64 / android
#                        并行构建,产物上传到已存在的 release
#                      (iOS 暂时禁用: 需要 Apple Developer 证书)
#   4. finalize         - 汇总构建状态到 Step Summary
#
# 关键修复:
#   - productName 已统一为 ASCII (SchulteGrid) 解决 Windows WiX light.exe 不支持中文的问题
#   - 每个 upload 步骤带 retry,避免 6 个 job 并发上传触发的 gh release 临时冲突
#   - macOS .app 通过 ditto zip 压缩后上传(避开目录上传限制)
#   - iOS 使用 --ci (Tauri 2.x 推荐) 跳过交互式 codesign
#   - Android 修正 glob 路径(src-tauri/gen/android/app/build/outputs/apk/release/*.apk)
#   - finalize 步骤给最终 release 一个 "published" 标的状态
name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
  NODE_VERSION: '24'

jobs:
  # ============================================================
  # Preflight: 质量门禁 (typecheck + 单元测试 + web 端构建)
  # ============================================================
  preflight:
    name: Preflight (typecheck + tests)
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Generate PWA icons (web)
        run: npm run prebuild

      - name: Type check (vue-tsc)
        run: npx vue-tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Web build (sanity)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx vite build

  # ============================================================
  # Create Release: 抢先创建 draft Release
  # ============================================================
  create-release:
    name: Create Release
    if: github.ref_type == 'tag'
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      release_url: ${{ steps.create.outputs.html_url }}
      tag: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft GitHub Release (gh CLI)
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          echo "Creating draft release for tag: ${TAG}"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "##[error]Tag ${TAG} not found"
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Existing release for ${TAG} found, deleting it first"
            gh release delete "${TAG}" --yes || true
          fi
          CREATE_OUT=$(gh release create "${TAG}" \
            --title "Schulte Grid ${TAG}" \
            --draft \
            --generate-notes \
            --target "${{ github.sha }}" \
            2>&1)
          echo "$CREATE_OUT"
          RELEASE_URL=$(echo "$CREATE_OUT" | grep -E '^https://' | head -n1)
          if [ -z "$RELEASE_URL" ]; then
            echo "##[error]Failed to create release - no URL in output"
            echo "$CREATE_OUT"
            exit 1
          fi
          echo "Release URL: $RELEASE_URL"
          RELEASE_ID=$(gh release view "${TAG}" --json id --jq '.id')
          echo "Release ID: $RELEASE_ID"
          {
            echo "id=$RELEASE_ID"
            echo "html_url=$RELEASE_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "## Release created successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Release ID:** ${{ steps.create.outputs.id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.create.outputs.html_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All build jobs will now upload their artifacts to this release." >> "$GITHUB_STEP_SUMMARY"

          echo "--- Verifying release exists via API ---"
          DRAFT=$(gh release view "${TAG}" --jq '.draft // false' 2>/dev/null || echo "false")
          echo "Release draft status: ${DRAFT}"
          if [ "${DRAFT}" != "true" ]; then
            echo "::warning::Release draft check returned: ${DRAFT} (expected true). Continuing anyway."
          else
            echo "Release verified as draft"
          fi

  # ============================================================
  # Linux 桌面
  # ============================================================
  linux:
    name: Linux (.deb / .AppImage)
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            zip \
            unzip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-linux-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          echo "--- node ---"
          node --version
          echo "--- tauri ---"
          npx tauri --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (Linux)
        run: |
          set -o pipefail
          npx tauri build 2>&1 | tee build-linux.log
        env:
          CI: 'true'

      - name: Verify Linux artifacts exist
        if: always()
        run: |
          echo "--- bundle dir ---"
          find src-tauri/target/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          echo "--- end ---"
          DEB_COUNT=$(find src-tauri/target/release/bundle/deb -maxdepth 1 -name "*.deb" 2>/dev/null | wc -l)
          APPIMAGE_COUNT=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name "*.AppImage" 2>/dev/null | wc -l)
          echo "deb count: ${DEB_COUNT}, appimage count: ${APPIMAGE_COUNT}"
          if [ "${DEB_COUNT}" -eq 0 ] || [ "${APPIMAGE_COUNT}" -eq 0 ]; then
            echo "::error::Missing Linux artifacts: deb=${DEB_COUNT} appimage=${APPIMAGE_COUNT}"
            exit 1
          fi
          echo "Linux artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux-logs
          path: build-linux.log
          if-no-files-found: ignore

      - name: Upload to Release (Linux) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No Linux artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          # retry up to 3 times to handle transient 5xx / release lock contention
          attempt=1
          until gh release upload "${TAG}" "${FILES[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  # ============================================================
  # Windows 桌面
  # ============================================================
  windows:
    name: Windows (.msi / .exe)
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Check build environment
        shell: bash
        run: |
          echo "=== Build environment ==="
          rustc --version
          cargo --version
          echo "NSIS: $(ls '/c/Program Files (x86)/NSIS/makensis.exe' 2>/dev/null && echo 'found' || echo 'not found')"
          echo "WiX: $(ls '/c/Program Files (x86)/WiX Toolset'*/bin/candle.exe 2>/dev/null && echo 'found' || echo 'not found')"
          echo "=== Done ==="

      - name: Build Tauri (Windows)
        shell: cmd
        env:
          CI: 'true'
          RUST_BACKTRACE: '0'
        run: |
          @echo on
          setlocal enabledelayedexpansion

          REM --- Set up MSVC developer environment for rc.exe (needed by tauri-winres) ---
          REM vcvars64.bat sets PATH, INCLUDE, LIB for this cmd session.
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set VSPATH=%%i
          echo VS installation: %VSPATH%
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat"

          REM Debug: verify rc.exe and key env vars
          echo === rc.exe ===
          where rc.exe
          echo === INCLUDE (first 300 chars) ===
          echo %INCLUDE:~0,300%
          echo === LIB (first 300 chars) ===
          echo %LIB:~0,300%
          echo === rustc ===
          rustc --version

          REM Test rc.exe with a minimal resource file
          echo === Testing rc.exe directly ===
          echo. > test-rc.rc
          rc.exe /fo test-rc.res test-rc.rc
          echo rc.exe test exit code: !ERRORLEVEL!
          if exist test-rc.res (echo test-rc.res created OK) else (echo test-rc.res NOT created)

          REM --- Build with MSI -> NSIS fallback ---
          echo === running tauri build (msi) ===
          call npx tauri build --bundles msi > build-windows.log 2>&1
          set MSI_EXIT=!ERRORLEVEL!
          echo === msi build exit code: !MSI_EXIT! ===
          type build-windows.log

          if not "!MSI_EXIT!"=="0" (
            echo ::warning::MSI build failed, trying NSIS...
            call npx tauri build --bundles nsis > build-windows-nsis.log 2>&1
            set NSIS_EXIT=!ERRORLEVEL!
            echo === nsis build exit code: !NSIS_EXIT! ===
            type build-windows-nsis.log

            if not "!NSIS_EXIT!"=="0" (
              echo === Error lines from MSI log ===
              findstr /i /c:"error" /c:"RC.EXE" /c:"panic" /c:"Failed" /c:"unwrap" build-windows.log 2>nul

              echo === Error lines from NSIS log ===
              findstr /i /c:"error" /c:"RC.EXE" /c:"panic" /c:"Failed" /c:"unwrap" build-windows-nsis.log 2>nul

              exit /b 1
            )
          )
          echo === BUILD SUCCEEDED ===
          dir /s /b src-tauri\target\release\bundle\*.msi src-tauri\target\release\bundle\*.exe 2>nul

      - name: Verify Windows artifacts exist
        if: always()
        shell: pwsh
        run: |
          # Analyze build logs and create error annotations
          foreach ($logFile in @("build-windows.log", "build-windows-nsis.log")) {
            if (Test-Path $logFile) {
              $lines = Get-Content $logFile -ErrorAction SilentlyContinue
              if ($lines) {
                # Find error lines
                $errorLines = $lines | Where-Object { $_ -match "error|RC\.EXE|panic|Failed|unwrap|cannot|not found" } | Select-Object -First 15
                if ($errorLines) {
                  $errSummary = ($errorLines -join ' ')
                  if ($errSummary.Length -gt 4000) { $errSummary = $errSummary.Substring(0, 4000) }
                  Write-Host "::error::$logFile errors: $errSummary"
                }
                # Write to step summary
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## $logFile (last 80 lines)"
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
                $lines | Select-Object -Last 80 | Out-String | Add-Content -Path $env:GITHUB_STEP_SUMMARY
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
                Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
              }
            }
          }

          $msiDir = "src-tauri/target/release/bundle/msi"
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $msiCount = 0
          $nsisCount = 0
          if (Test-Path $msiDir) {
            $msiCount = (Get-ChildItem $msiDir -Filter "*.msi" -ErrorAction SilentlyContinue | Measure-Object).Count
          }
          if (Test-Path $nsisDir) {
            $nsisCount = (Get-ChildItem $nsisDir -Filter "*.exe" -ErrorAction SilentlyContinue | Measure-Object).Count
          }
          Write-Host "msi count: $msiCount, nsis count: $nsisCount"
          if ($msiCount -eq 0 -and $nsisCount -eq 0) {
            Write-Host "::error::No Windows installer artifacts found (need at least one of msi/nsis)"
            exit 1
          }
          Write-Host "Windows artifacts verified (msi=$msiCount nsis=$nsisCount)"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows-logs
          path: |
            build-windows.log
            build-windows-nsis.log
          if-no-files-found: ignore

      - name: Upload to Release (Windows) with retry
        if: github.ref_type == 'tag' && success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          echo "=== Looking for Windows artifacts ==="
          echo "msi dir:"
          ls -la src-tauri/target/release/bundle/msi/ 2>/dev/null || echo "  (no msi dir)"
          echo "nsis dir:"
          ls -la src-tauri/target/release/bundle/nsis/ 2>/dev/null || echo "  (no nsis dir)"
          FILES=(
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          )
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No Windows artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          attempt=1
          until gh release upload "${TAG}" "${FILES[@]}" --clobber; do
            EXIT_CODE=$?
            echo "Upload attempt ${attempt} failed with exit code ${EXIT_CODE}"
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts (last exit code: ${EXIT_CODE})"
              echo "=== gh release view ==="
              gh release view "${TAG}" 2>&1 || true
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # ============================================================
  # macOS arm64
  # ============================================================
  macos-arm64:
    name: macOS arm64 (.dmg)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-arm64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-arm64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS arm64)
        run: |
          set -o pipefail
          npx tauri build --target aarch64-apple-darwin 2>&1 | tee build-macos-arm64.log
        env:
          CI: 'true'

      - name: Verify macOS arm64 artifacts exist
        if: always()
        run: |
          find src-tauri/target/aarch64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          DMG_COUNT=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" 2>/dev/null | wc -l)
          APP_COUNT=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d 2>/dev/null | wc -l)
          echo "dmg count: ${DMG_COUNT}, .app count: ${APP_COUNT}"
          if [ "${DMG_COUNT}" -eq 0 ] && [ "${APP_COUNT}" -eq 0 ]; then
            echo "::error::No macOS arm64 artifacts found (need at least one of dmg/.app)"
            exit 1
          fi
          echo "macOS arm64 artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64-logs
          path: build-macos-arm64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS arm64) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # .dmg 直接上传;.app 是目录,先 zip 压缩(避免 >2GB 单文件 + 不支持目录上传)
          FILES=()
          for f in src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            [ -e "$f" ] && FILES+=("$f")
          done
          for d in src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app; do
            if [ -d "$d" ]; then
              parent="$(dirname "$d")"
              base="$(basename "$d")"
              cd "$parent"
              zip_path="${base}.zip"
              # ditto 在 macOS 上保留资源分支
              ditto -c -k --sequesterRsrc --keepParent "$base" "$zip_path"
              cd - >/dev/null
              FILES+=("$parent/$zip_path")
            fi
          done
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No macOS arm64 artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          attempt=1
          until gh release upload "${TAG}" "${FILES[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.zip
          if-no-files-found: ignore

  # ============================================================
  # macOS x64
  # ============================================================
  macos-x64:
    name: macOS x64 (.dmg)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-x64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS x64)
        run: |
          set -o pipefail
          npx tauri build --target x86_64-apple-darwin 2>&1 | tee build-macos-x64.log
        env:
          CI: 'true'

      - name: Verify macOS x64 artifacts exist
        if: always()
        run: |
          find src-tauri/target/x86_64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          DMG_COUNT=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -maxdepth 1 -name "*.dmg" 2>/dev/null | wc -l)
          APP_COUNT=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -maxdepth 1 -name "*.app" -type d 2>/dev/null | wc -l)
          echo "dmg count: ${DMG_COUNT}, .app count: ${APP_COUNT}"
          if [ "${DMG_COUNT}" -eq 0 ] && [ "${APP_COUNT}" -eq 0 ]; then
            echo "::error::No macOS x64 artifacts found (need at least one of dmg/.app)"
            exit 1
          fi
          echo "macOS x64 artifacts verified"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64-logs
          path: build-macos-x64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS x64) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=()
          for f in src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg; do
            [ -e "$f" ] && FILES+=("$f")
          done
          for d in src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app; do
            if [ -d "$d" ]; then
              parent="$(dirname "$d")"
              base="$(basename "$d")"
              cd "$parent"
              zip_path="${base}.zip"
              ditto -c -k --sequesterRsrc --keepParent "$base" "$zip_path"
              cd - >/dev/null
              FILES+=("$parent/$zip_path")
            fi
          done
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No macOS x64 artifacts found to upload"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${FILES[@]}"
          attempt=1
          until gh release upload "${TAG}" "${FILES[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.zip
          if-no-files-found: ignore

  # ============================================================
  # Android (APK)
  # ============================================================
  android:
    name: Android (.apk)
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          # Tauri 2.x 需要 NDK 进行 Rust -> Android 交叉编译
          yes | sdkmanager --install "ndk;27.0.12077973" 2>/dev/null || true
          NDK_DIR="${ANDROID_HOME}/ndk/27.0.12077973"
          if [ ! -d "$NDK_DIR" ]; then
            NDK_DIR=$(find "${ANDROID_HOME}/ndk" -maxdepth 1 -type d 2>/dev/null | head -1)
          fi
          if [ -z "$NDK_DIR" ] || [ ! -d "$NDK_DIR" ]; then
            echo "::error::Failed to install Android NDK"
            exit 1
          fi
          echo "NDK installed at: $NDK_DIR"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init Android project (idempotent)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "--- Running tauri android init ---"
            npx tauri android init
            INIT_EXIT=$?
            if [ $INIT_EXIT -ne 0 ]; then
              echo "::error::tauri android init failed with exit code $INIT_EXIT"
              exit 1
            fi
          else
            echo "--- src-tauri/gen/android already exists, skipping init ---"
          fi
          echo "--- gen/android contents ---"
          ls -la src-tauri/gen/android/ 2>/dev/null || echo "gen/android dir not found!"

      - name: Build Tauri (Android APK)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          CI: 'true'
        run: |
          set -o pipefail
          npx tauri android build --apk --verbose 2>&1 | tee build-android.log
          BUILD_EXIT=$?
          echo "=== Build exit code: ${BUILD_EXIT} ==="
          if [ ${BUILD_EXIT} -ne 0 ]; then
            echo "::error::Android build failed with exit code ${BUILD_EXIT}"
            exit 1
          fi
          echo "=== Searching for APK/AAB files ==="
          find . -not -path "*/node_modules/*" \( -name "*.apk" -o -name "*.aab" \) -type f 2>/dev/null
          echo "=== gen/android/build tree ==="
          find src-tauri/gen/android -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "no gen/android dir"
          echo "=== Done ==="

      - name: Verify Android artifacts exist
        if: always()
        run: |
          echo "--- broad search for APK/AAB (excluding node_modules) ---"
          find . -not -path "*/node_modules/*" \( -name "*.apk" -o -name "*.aab" \) -type f 2>/dev/null | head -30
          echo "--- end ---"
          APK_FILES=$(find . -not -path "*/node_modules/*" -name "*.apk" -type f 2>/dev/null)
          AAB_FILES=$(find . -not -path "*/node_modules/*" -name "*.aab" -type f 2>/dev/null)
          APK_COUNT=$(echo "$APK_FILES" | grep -c '\.apk$' || true)
          AAB_COUNT=$(echo "$AAB_FILES" | grep -c '\.aab$' || true)
          echo "apk count: ${APK_COUNT}, aab count: ${AAB_COUNT}"
          if [ "${APK_COUNT}" -eq 0 ] && [ "${AAB_COUNT}" -eq 0 ]; then
            echo "::error::No Android artifacts found anywhere in project"
            echo "--- listing src-tauri/gen/android if exists ---"
            find src-tauri/gen/android -type f 2>/dev/null | head -50 || echo "no gen/android dir"
            exit 1
          fi
          echo "Android artifacts verified"
          echo "APK files:"
          echo "$APK_FILES"
          echo "AAB files:"
          echo "$AAB_FILES"

      - name: Sign APK for installation
        shell: bash
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -euo pipefail
          # Find the unsigned APK
          UNSIGNED_APK=$(find . -not -path "*/node_modules/*" -name "*-unsigned.apk" -type f 2>/dev/null | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found, checking for any APK..."
            UNSIGNED_APK=$(find . -not -path "*/node_modules/*" -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -z "$UNSIGNED_APK" ]; then
              echo "::error::No APK found to sign"
              exit 1
            fi
          fi
          echo "Found APK to sign: $UNSIGNED_APK"

          # Generate a release keystore (self-signed, valid for 10000 days)
          KEYSTORE_PATH="$HOME/schulte-release.keystore"
          keytool -genkeypair \
            -alias schulte \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore "$KEYSTORE_PATH" \
            -storepass schulte123 \
            -keypass schulte123 \
            -dname "CN=Schulte App, OU=Dev, O=Schulte, L=Beijing, ST=Beijing, C=CN"

          # Find zipalign and apksigner from Android SDK build-tools
          BUILD_TOOLS_DIR=$(ls -d ${ANDROID_HOME}/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "::error::No build-tools found in Android SDK"
            exit 1
          fi
          echo "Build tools dir: $BUILD_TOOLS_DIR"
          ZIPALIGN="${BUILD_TOOLS_DIR}zipalign"
          APKSIGNER="${BUILD_TOOLS_DIR}apksigner"

          # Create signed output path
          SIGNED_APK="${UNSIGNED_APK%-unsigned.apk}-signed.apk"
          if [ "$SIGNED_APK" = "$UNSIGNED_APK" ]; then
            SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"
          fi

          # Step 1: zipalign the APK
          echo "=== Zipaligning APK ==="
          "$ZIPALIGN" -f 4 "$UNSIGNED_APK" "$SIGNED_APK"

          # Step 2: Sign with apksigner (v1+v2+v3 for maximum compatibility)
          echo "=== Signing APK ==="
          "$APKSIGNER" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias schulte \
            --ks-pass pass:schulte123 \
            --key-pass pass:schulte123 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$SIGNED_APK"

          # Step 3: Verify signature
          echo "=== Verifying signature ==="
          "$APKSIGNER" verify --verbose "$SIGNED_APK"

          # Replace the unsigned APK with the signed one for upload
          cp "$SIGNED_APK" "$UNSIGNED_APK"
          echo "=== APK signed successfully: $SIGNED_APK ==="
          ls -lh "$SIGNED_APK" "$UNSIGNED_APK"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android-logs
          path: build-android.log
          if-no-files-found: ignore

      - name: Upload to Release (Android) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Find signed APKs first, fall back to any APK/AAB
          mapfile -d $'\0' FILES < <(find . -not -path "*/node_modules/*" \( -name '*-signed.apk' -o -name '*.apk' -o -name '*.aab' \) -type f -print0 2>/dev/null)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No Android artifacts found to upload"
            exit 1
          fi
          # Deduplicate: prefer signed APKs over unsigned ones
          declare -A SEEN
          UNIQUE_FILES=()
          for f in "${FILES[@]}"; do
            base=$(basename "$f")
            if [[ "$base" == *"-signed.apk" ]]; then
              SEEN["$base"]=1
              UNIQUE_FILES+=("$f")
            elif [[ "$base" == *"-unsigned.apk" ]]; then
              signed_base="${base%-unsigned.apk}-signed.apk"
              if [ -z "${SEEN[$signed_base]+x}" ]; then
                UNIQUE_FILES+=("$f")
              fi
            else
              UNIQUE_FILES+=("$f")
            fi
          done
          echo "Uploading ${#UNIQUE_FILES[@]} file(s) to release ${TAG}:"
          printf '  - %s\n' "${UNIQUE_FILES[@]}"
          attempt=1
          until gh release upload "${TAG}" "${UNIQUE_FILES[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: ignore

  # ============================================================
  # Android APK 验证 (模拟器安装 + 启动 + 截图)
  # ============================================================
  android-verify:
    name: Android Verify (emulator)
    needs: android
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          yes | sdkmanager --install "ndk;27.0.12077973" 2>/dev/null || true
          NDK_DIR="${ANDROID_HOME}/ndk/27.0.12077973"
          if [ ! -d "$NDK_DIR" ]; then
            NDK_DIR=$(find "${ANDROID_HOME}/ndk" -maxdepth 1 -type d 2>/dev/null | head -1)
          fi
          if [ -z "$NDK_DIR" ] || [ ! -d "$NDK_DIR" ]; then
            echo "::error::Failed to install Android NDK"
            exit 1
          fi
          echo "NDK installed at: $NDK_DIR"
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init Android project
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init
          fi

      - name: Build Android APK (debug for emulator)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          CI: 'true'
        run: |
          npx tauri android build --apk --debug 2>&1 | tee build-android-debug.log
          echo "=== Build exit code: $? ==="

      - name: Find built APK
        id: find-apk
        shell: bash
        run: |
          APK=$(find . -not -path "*/node_modules/*" -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Boot Android Emulator & verify APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          heap-size: 512M
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "=== Emulator booted ==="

            # Find the APK
            APK_FILE=$(find . -not -path "*/node_modules/*" -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -z "$APK_FILE" ]; then
              echo "::error::No APK found to install"
              exit 1
            fi
            echo "APK to install: $APK_FILE"

            echo "=== Installing APK ==="
            adb install -r "$APK_FILE"
            INSTALL_EXIT=$?
            echo "Install exit code: $INSTALL_EXIT"
            if [ "$INSTALL_EXIT" -ne 0 ]; then
              echo "::error::APK installation failed"
              exit 1
            fi

            echo "=== Checking installed package ==="
            adb shell pm list packages | grep schulte || echo "Package not found!"

            echo "=== Launching app via monkey ==="
            adb shell monkey -p com.schulte.app -c android.intent.category.LAUNCHER 1
            echo "Monkey launch exit code: $?"

            echo "=== Waiting for app to load (15 seconds) ==="
            sleep 15

            echo "=== Checking if app process is running ==="
            PID=$(adb shell pidof com.schulte.app 2>/dev/null | tr -d '\r\n' || echo "")
            if [ -z "$PID" ]; then
              echo "::warning::App process not found via pidof, trying ps grep..."
              adb shell ps | grep schulte || echo "No schulte process in ps"
              echo "=== Dumping window info ==="
              adb shell dumpsys window windows 2>/dev/null | grep -E 'mCurrentFocus|mFocusedApp' || true
              echo "=== Logcat (last 100 lines, schulte filter) ==="
              adb logcat -d | grep -i "schulte" | tail -100
              echo "=== Full logcat (last 50 lines) ==="
              adb logcat -d | tail -50
              echo "::error::App process not found - app may have crashed"
              exit 1
            fi
            echo "App is running with PID: $PID"

            echo "=== Taking screenshot ==="
            adb exec-out screencap -p > /tmp/app-screenshot.png
            ls -la /tmp/app-screenshot.png

            echo "=== Checking logcat for errors ==="
            adb logcat -d | grep -i "com.schulte" | grep -iE "error|exception|crash|fatal" | tail -20 || echo "No errors found in logcat"

            echo "=== APK verification PASSED ==="

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-screenshot
          path: /tmp/app-screenshot.png
          if-no-files-found: warn

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-logcat
          path: build-android-debug.log
          if-no-files-found: ignore

  # ============================================================
  # iOS (.app 不签名,作为 zip 提供)
  # ============================================================
  ios:
    if: false  # 暂时禁用: iOS 构建需要 Apple Developer 证书进行 codesign
    name: iOS (.app unsigned)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init iOS project (idempotent)
        run: |
          if [ ! -d "src-tauri/gen/apple" ] && [ ! -d "src-tauri/gen/ios" ]; then
            echo "--- Running tauri ios init ---"
            npx tauri ios init || echo "init failed, will try direct build"
          else
            echo "--- iOS project already exists, skipping init ---"
          fi

      - name: Build Tauri (iOS device .app, no codesign)
        env:
          CI: 'true'
        run: |
          set -o pipefail
          # Tauri 2.x: 使用 tauri ios build 不带 --no-bundle (iOS 设备 target 必须经过 Xcode)
          # --ci 跳过交互式提示(自动 codesign 禁用)
          npx tauri ios build --ci --target aarch64-apple-ios 2>&1 | tee build-ios-device.log
        continue-on-error: true

      - name: Build Tauri (iOS sim .app, no codesign) - fallback
        if: failure()
        env:
          CI: 'true'
        run: |
          set -o pipefail
          # 备选:构建模拟器 target
          npx tauri ios build --ci --target aarch64-apple-ios-sim 2>&1 | tee build-ios-sim.log
        continue-on-error: true

      - name: Locate any built .app
        if: always()
        run: |
          echo "--- find .app (everywhere) ---"
          find src-tauri -name "*.app" 2>/dev/null
          echo "--- end ---"
          # 也接受 .ipa 产物(若 codesign 配置可用)
          find src-tauri -name "*.ipa" 2>/dev/null
          echo "--- end ipa ---"
          APP_COUNT=$(find src-tauri -name "*.app" -type d 2>/dev/null | wc -l)
          if [ "${APP_COUNT}" -eq 0 ]; then
            echo "::error::No iOS .app artifact found"
            exit 1
          fi
          echo "iOS .app found: ${APP_COUNT}"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios-logs
          path: |
            build-ios-device.log
            build-ios-sim.log
          if-no-files-found: ignore

      - name: Zip and upload to Release (iOS) with retry
        if: github.ref_type == 'tag' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # 收集所有 .app 目录并逐个压缩
          APP_DIRS=( $(find src-tauri -name "*.app" -type d 2>/dev/null) )
          if [ ${#APP_DIRS[@]} -eq 0 ]; then
            echo "::error::No iOS .app directory found to zip"
            exit 1
          fi
          echo "Found ${#APP_DIRS[@]} .app dir(s):"
          printf '  - %s\n' "${APP_DIRS[@]}"

          ZIPS=()
          for app_dir in "${APP_DIRS[@]}"; do
            parent="$(dirname "$app_dir")"
            base="$(basename "$app_dir")"
            zip_name="${base}.zip"
            echo "Zipping: $app_dir -> $parent/$zip_name"
            ( cd "$parent" && ditto -c -k --sequesterRsrc --keepParent "$base" "$zip_name" )
            ZIPS+=("$parent/$zip_name")
          done
          echo "Uploading ${#ZIPS[@]} zip(s) to release ${TAG}:"
          printf '  - %s\n' "${ZIPS[@]}"
          attempt=1
          until gh release upload "${TAG}" "${ZIPS[@]}" --clobber; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::gh release upload failed after 3 attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
            echo "Retrying (attempt ${attempt})..."
          done

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios
          path: "**/*.app.zip"
          if-no-files-found: ignore

  # ============================================================
  # 收尾: 汇总所有平台构建状态
  # ============================================================
  finalize:
    name: Finalize Release
    needs: [linux, windows, macos-arm64, macos-x64, android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build status summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## Release Build Summary"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Linux       | ${{ needs.linux.result }} |"
            echo "| Windows     | ${{ needs.windows.result }} |"
            echo "| macOS arm64 | ${{ needs.macos-arm64.result }} |"
            echo "| macOS x64   | ${{ needs.macos-x64.result }} |"
            echo "| Android     | ${{ needs.android.result }} |"
            echo "| iOS         | disabled (needs codesign) |"
            echo ""
            echo "_Note: Android emulator verification runs in parallel and does not block the release. Check the 'Android Verify (emulator)' job for results._"
            echo ""
            echo "Release: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
            echo ""
            echo "### Assets in release"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              gh release view "${TAG}" --repo ${{ github.repository }} --json assets --jq '.assets[] | "- \(.name) (\(.size) bytes)"' 2>/dev/null || echo "_(could not fetch asset list)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release (if all builds succeeded)
        if: github.ref_type == 'tag' && needs.linux.result == 'success' && needs.windows.result == 'success' && needs.macos-arm64.result == 'success' && needs.macos-x64.result == 'success' && needs.android.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "All builds succeeded, publishing draft release ${TAG}..."
          gh release edit "${TAG}" --repo ${{ github.repository }} --draft=false
          echo "Release published: https://github.com/${{ github.repository }}/releases/tag/${TAG}"

      - name: Warn about failed builds
        if: github.ref_type == 'tag' && (needs.linux.result != 'success' || needs.windows.result != 'success' || needs.macos-arm64.result != 'success' || needs.macos-x64.result != 'success' || needs.android.result != 'success')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "::warning::Some builds failed - release ${TAG} remains as draft"
          echo "Build results:"
          echo "  Linux: ${{ needs.linux.result }}"
          echo "  Windows: ${{ needs.windows.result }}"
          echo "  macOS arm64: ${{ needs.macos-arm64.result }}"
          echo "  macOS x64: ${{ needs.macos-x64.result }}"
          echo "  Android: ${{ needs.android.result }}"

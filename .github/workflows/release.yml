    name: macOS x64 (.dmg)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-macos-x64-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-macos-x64-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Build Tauri (macOS x64)
        run: |
          set -o pipefail
          npx tauri build --target x86_64-apple-darwin 2>&1 | tee build-macos-x64.log
        env:
          CI: 'true'

      - name: List bundle outputs
        if: always()
        run: |
          find src-tauri/target/x86_64-apple-darwin/release/bundle -maxdepth 3 -type f 2>/dev/null | head -30
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64-logs
          path: build-macos-x64.log
          if-no-files-found: ignore

      - name: Upload to Release (macOS x64)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: ignore

  # ============================================================
  # Android (APK)
  # ============================================================
  android:
    name: Android (.apk)
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init Android project (idempotent)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "--- Running tauri android init ---"
            npx tauri android init
          else
            echo "--- src-tauri/gen/android already exists, skipping init ---"
          fi

      - name: Build Tauri (Android APK)
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          CI: 'true'
        run: |
          set -o pipefail
          npx tauri android build --apk 2>&1 | tee build-android.log

      - name: List APK outputs
        if: always()
        run: |
          echo "--- find APK ---"
          find src-tauri/gen/android -name "*.apk" 2>/dev/null | head -20
          echo "--- find AAB ---"
          find src-tauri/gen/android -name "*.aab" 2>/dev/null | head -20
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android-logs
          path: build-android.log
          if-no-files-found: ignore

      - name: Upload to Release (Android)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: ignore

  # ============================================================
  # iOS (产 .app, 不签名)
  # ============================================================
  ios:
    name: iOS (.app unsigned)
    needs: create-release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-ios-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-ios-

      - name: Install JS deps
        run: npm ci

      - name: Verify Tauri CLI
        run: |
          node --version
          npx tauri --version
          rustc --version

      - name: Generate Tauri icons
        run: npm run icons:tauri

      - name: Init iOS project (idempotent)
        run: |
          if [ ! -d "src-tauri/gen/apple" ] && [ ! -d "src-tauri/gen/ios" ]; then
            echo "--- Running tauri ios init ---"
            npx tauri ios init || echo "init failed, will try direct build"
          else
            echo "--- iOS project already exists, skipping init ---"
          fi

      - name: Build Tauri (iOS raw .app, no codesign)
        env:
          CI: 'true'
        run: |
          set -o pipefail
          # --bundles app: 只生成 .app,不生成需要签名的 .ipa
          npx tauri build --bundles app --target aarch64-apple-ios 2>&1 | tee build-ios.log

      - name: List .app outputs
        if: always()
        run: |
          echo "--- find .app ---"
          find src-tauri/target -name "*.app" 2>/dev/null | head -10
          echo "--- end ---"

      - name: Upload logs (workflow)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios-logs
          path: build-ios.log
          if-no-files-found: ignore

      - name: Upload to Release (iOS)
        if: github.ref_type == 'tag' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/**/*.app
          fail_on_unmatched_files: false

      - name: Upload artifact (workflow)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: schulte-ios
          path: |
            src-tauri/target/**/*.app
          if-no-files-found: ignore

  # ============================================================
  # 收尾: 汇总所有平台构建状态
  # ============================================================
  finalize:
    name: Finalize Release
    needs: [linux, windows, macos-arm64, macos-x64, android, ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build status summary
        run: |
          echo "## Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux       | ${{ needs.linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows     | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS arm64 | ${{ needs.macos-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x64   | ${{ needs.macos-x64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android     | ${{ needs.android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS         | ${{ needs.ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Release is created as draft. After all builds succeed, publish from the Releases page._" >> $GITHUB_STEP_SUMMARY
